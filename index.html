<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代車くん 簡易版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>代車くん</h1>
    <p class="lead">簡易版 代車管理</p>

    <section class="section car-settings">
      <h2>代車一覧設定</h2>

      <label for="newCar">貸し出す代車を追加</label>
      <div class="inline-form">
        <input id="newCar" type="text" placeholder="例：代車1　ワゴンR　郡山〇〇 あ12-34">
        <button id="addCarBtn" class="sub-btn" type="button">追加</button>
      </div>

      <p class="note">配布先の会社が、自社の代車名・車種・ナンバーをここで登録できます。</p>
      <div id="carList" class="car-list"></div>
    </section>

    <section class="section">
      <h2>貸出代車</h2>

      <label for="rentalCar">代車を選択</label>
      <select id="rentalCar" required>
        <option value="">代車を選択してください ※必須</option>
      </select>
    </section>

    <section class="section">
      <h2>お客様情報</h2>

      <label class="sr-only" for="customerName">氏名</label>
      <input id="customerName" type="text" placeholder="氏名 ※必須" required>

      <label class="sr-only" for="customerTel">TEL</label>
      <input id="customerTel" type="tel" inputmode="numeric" placeholder="TEL ※必須（ハイフンなし11桁）" required>
    </section>

    <section class="section">
      <h2>貸出内容</h2>

      <label for="reason">貸出理由</label>
      <select id="reason">
        <option>車検</option>
        <option>修理</option>
        <option>板金</option>
        <option>事故対応</option>
      </select>

      <label for="startDate">貸出日時</label>
      <input id="startDate" type="datetime-local">

      <label for="endDate">返却予定日時</label>
      <input id="endDate" type="datetime-local">
    </section>

    <section class="section">
      <h2>確認事項</h2>

      <p class="note">※ 甲は当店、乙はお客様を表します。</p>

      <div id="checkList" class="check-list"></div>
    </section>

    <section class="section">
      <h2>貸出担当者</h2>

      <label class="sr-only" for="staff">担当者</label>
      <select id="staff" required>
        <option value="">担当者を選択してください ※必須</option>
        <option>社長</option>
        <option>瀧田</option>
        <option>菅野</option>
        <option>引き取り</option>
      </select>
    </section>

    <section class="section">
      <h2>署名</h2>

      <label class="sr-only" for="signature">署名</label>
      <input id="signature" type="text" placeholder="署名 ※必須" required>

      <button class="rent-btn" type="button">貸出確認完了</button>
    </section>

    <hr>

    <section class="section">
      <h1 class="return-title">返却処理</h1>

      <label for="returnCar">返却する代車</label>
      <select id="returnCar">
        <option value="">返却する代車を選択</option>
      </select>

      <button class="return-btn" type="button">返却完了</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
